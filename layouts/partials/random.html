<section class="random">
  <h2>随机推荐</h2>
  <div id="random-grid" class="person-grid"></div>
  <script>
    const allPages = [
      {{ range .pages }}
        { url: "{{ .RelPermalink }}", title: "{{ .Title }}", image: "{{ .Params.image }}", bio: "{{ .Params.bio }}" },
      {{ end }}
    ];
    const excludeURLs = {{ .exclude | jsonify }};
    const filtered = allPages.filter(p => !excludeURLs.includes(p.url));
    const shuffled = filtered.sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, 9);
    const grid = document.getElementById('random-grid');
    selected.forEach(person => {
      grid.innerHTML += `
        <div class="card">
          <img src="${person.image || '/images/placeholder.jpg'}" alt="${person.title}">
          <div class="info">
            <h3><a href="${person.url}">${person.title}</a></h3>
            <p>${person.bio ? person.bio.substring(0, 100) : ''}</p>
          </div>
        </div>
      `;
    });
  </script>
</section>
